local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "website/assets/images/uploads"
public_folder: "/assets/images/uploads"

locale: "fr"

collections:
  # 1. Site Settings (singleton)
  - name: "settings"
    label: "Paramètres du site"
    files:
      - name: "general"
        label: "Informations générales"
        file: "website/content/settings.json"
        fields:
          - { label: "Nom de l'entreprise", name: "company_name", widget: "string" }
          - { label: "Slogan", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Titre Hero", name: "hero_title", widget: "string" }
          - { label: "Sous-titre Hero", name: "hero_subtitle", widget: "text" }
          - { label: "À propos (texte principal)", name: "about_text", widget: "text" }
          - { label: "À propos PROTON", name: "about_proton", widget: "text" }
          - { label: "À propos GLEECON", name: "about_gleecon", widget: "text" }
          - { label: "WhatsApp", name: "phone_whatsapp", widget: "string" }
          - { label: "Téléphone secondaire", name: "phone_secondary", widget: "string" }
          - { label: "Email principal", name: "email", widget: "string" }
          - { label: "Email secondaire", name: "email_secondary", widget: "string" }
          - { label: "Adresse", name: "address", widget: "string" }
          - { label: "Facebook", name: "facebook", widget: "string" }
          - { label: "Instagram", name: "instagram", widget: "string" }
          - { label: "TikTok", name: "tiktok", widget: "string" }
          - { label: "Horaires", name: "hours", widget: "string" }

  # 2. Solar Systems (folder collection)
  - name: "solar-systems"
    label: "Systèmes Solaires"
    label_singular: "Système Solaire"
    folder: "website/content/solar-systems"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{price_display}}"
    fields:
      - { label: "Nom", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - { label: "Petite Maison", value: "petite" }
          - { label: "Maison Moyenne", value: "moyenne" }
          - { label: "Grande Maison", value: "grande" }
          - { label: "Villa / Commerce", value: "villa" }
      - { label: "En stock", name: "in_stock", widget: "boolean", default: false }
      - { label: "Prix (FCFA)", name: "price", widget: "number", value_type: "int" }
      - { label: "Prix affiché", name: "price_display", widget: "string" }
      - { label: "Onduleur", name: "inverter", widget: "string" }
      - { label: "Batterie", name: "battery", widget: "string" }
      - { label: "Garantie batterie", name: "battery_warranty", widget: "string" }
      - { label: "Panneaux", name: "panels", widget: "string" }
      - { label: "Garantie panneaux", name: "panels_warranty", widget: "string" }
      - { label: "Temps de charge", name: "charge_time", widget: "string" }
      - label: "Appareils alimentés"
        name: "powers"
        widget: "list"
        field: { label: "Appareil", name: "item", widget: "string" }
      - label: "Inclus dans le kit"
        name: "includes"
        widget: "list"
        field: { label: "Élément", name: "item", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }

  # 3. Portable Stations (folder collection)
  - name: "portable-stations"
    label: "Stations Portables"
    label_singular: "Station Portable"
    folder: "website/content/portable-stations"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{price_display}}"
    fields:
      - { label: "Nom", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "En stock", name: "in_stock", widget: "boolean", default: false }
      - { label: "Prix (FCFA)", name: "price", widget: "number", value_type: "int" }
      - { label: "Prix affiché", name: "price_display", widget: "string" }
      - { label: "Puissance", name: "power", widget: "string" }
      - { label: "Batterie", name: "battery_capacity", widget: "string" }
      - label: "Caractéristiques"
        name: "features"
        widget: "list"
        field: { label: "Caractéristique", name: "item", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }

  # 4. Accessories (folder collection)
  - name: "accessories"
    label: "Accessoires"
    label_singular: "Accessoire"
    folder: "website/content/accessories"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{price_display}}"
    fields:
      - { label: "Nom", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Panneau Solaire", value: "panneau" }
          - { label: "Jump Starter", value: "jump-starter" }
          - { label: "Power Bank", value: "power-bank" }
      - { label: "En stock", name: "in_stock", widget: "boolean", default: false }
      - { label: "Prix (FCFA)", name: "price", widget: "number", value_type: "int" }
      - { label: "Prix affiché", name: "price_display", widget: "string" }
      - label: "Caractéristiques"
        name: "features"
        widget: "list"
        field: { label: "Caractéristique", name: "item", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }

  # 5. GLEECON Insect Killers (folder collection)
  - name: "gleecon"
    label: "Anti-Insectes GLEECON"
    label_singular: "Anti-Insecte"
    folder: "website/content/gleecon"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{price_display}}"
    fields:
      - { label: "Nom", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Modèle", name: "model", widget: "string" }
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - { label: "Rechargeable", value: "rechargeable" }
          - { label: "Électrique", value: "electrique" }
          - { label: "Solaire", value: "solaire" }
      - { label: "En stock", name: "in_stock", widget: "boolean", default: false }
      - { label: "Prix (FCFA)", name: "price", widget: "number", value_type: "int" }
      - { label: "Prix affiché", name: "price_display", widget: "string" }
      - { label: "Alimentation", name: "power_source", widget: "string" }
      - { label: "Méthode", name: "method", widget: "string" }
      - { label: "Étanchéité", name: "waterproof", widget: "string" }
      - { label: "Couverture", name: "coverage", widget: "string" }
      - { label: "Autonomie", name: "autonomy", widget: "string", required: false }
      - label: "Caractéristiques"
        name: "features"
        widget: "list"
        field: { label: "Caractéristique", name: "item", widget: "string" }
      - { label: "Badge", name: "badge", widget: "string", required: false }
      - { label: "Quantité en stock", name: "quantity", widget: "number", value_type: "int", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }

  # 6. FAQ (file collection)
  - name: "faq"
    label: "FAQ"
    files:
      - name: "faq"
        label: "Questions fréquentes"
        file: "website/content/faq/faq.json"
        fields:
          - label: "Questions"
            name: "items"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Réponse", name: "answer", widget: "text" }

  # 7. Testimonials (file collection)
  - name: "testimonials"
    label: "Témoignages"
    files:
      - name: "testimonials"
        label: "Témoignages clients"
        file: "website/content/testimonials/testimonials.json"
        fields:
          - label: "Témoignages"
            name: "items"
            widget: "list"
            fields:
              - { label: "Nom du client", name: "name", widget: "string" }
              - { label: "Témoignage", name: "text", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Produit acheté", name: "product", widget: "string", required: false }

  # 8. Promotions (file collection)
  - name: "promotions"
    label: "Promotions"
    files:
      - name: "promotions"
        label: "Bannière promotionnelle"
        file: "website/content/promotions/promotions.json"
        fields:
          - { label: "Promotion active", name: "active", widget: "boolean", default: false }
          - { label: "Texte de la bannière", name: "banner_text", widget: "string", required: false }
          - { label: "Date de début", name: "start_date", widget: "datetime", required: false }
          - { label: "Date de fin", name: "end_date", widget: "datetime", required: false }
          - { label: "Lien", name: "link", widget: "string", required: false }

  # 9. Gallery (folder collection)
  - name: "gallery"
    label: "Galerie Photos"
    label_singular: "Photo"
    folder: "website/content/gallery"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - { label: "PROTON", value: "proton" }
          - { label: "GLEECON", value: "gleecon" }
          - { label: "Installation", value: "installation" }
          - { label: "Usine", value: "usine" }
          - { label: "Événement", value: "evenement" }
      - { label: "Description", name: "description", widget: "text", required: false }
